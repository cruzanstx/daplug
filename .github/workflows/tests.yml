name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      # All suites + model registry check live in scripts/run-tests.sh so CI
      # and the /release skill share one source of truth for the suite list.
      - name: Run test suites
        env:
          PYTHON: python
        run: bash scripts/run-tests.sh
